<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandIQ.ai · Intelligent Candidate Discovery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F8FAFC;
            --surface-color: #FFFFFF;
            --sidebar-bg: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-faint: #94A3B8;
            --border-color: #E2E8F0;
            --border-soft: #F1F5F9;
            
            /* Accent Colors */
            --primary: #6366F1;
            --primary-hover: #4F46E5;
            --success: #10B981;
            --success-bg: #D1FAE5;
            --warning: #F59E0B;
            --warning-bg: #FEF3C7;
            --danger: #EF4444;
            --danger-bg: #FEE2E2;
            --info: #3B82F6;
            --info-bg: #DBEAFE;
            --purple: #6366F1;
        }

        /* Dark mode */
        [data-theme="dark"] {
            --bg-color: #0F0F0F;
            --surface-color: #212121;
            --sidebar-bg: #181818;
            --text-primary: #F1F1F1;
            --text-secondary: #AAAAAA;
            --text-faint: #888888;
            --border-color: #3f3f3f;
            --border-soft: #2F2F2F;

            /* Accent Colors adjusted for dark mode */
            --primary: #3EA6FF;
            --primary-hover: #65B8FF;
            --success: #4ADE80;
            --success-bg: rgba(74, 222, 128, 0.14);
            --warning: #FBBF24;
            --warning-bg: rgba(251, 191, 36, 0.14);
            --danger: #F87171;
            --danger-bg: rgba(248, 113, 113, 0.14);
            --info: #3EA6FF;
            --info-bg: rgba(62, 166, 255, 0.14);
            --purple: #A78BFA;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            background: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        #root { min-height: 100%; display: flex; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Rendered Markdown for the AI Assessment (deep dive) */
        .md-content {
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 14px;
            line-height: 1.65;
            color: #E2E8F0;
        }
        .md-content > :first-child { margin-top: 0; }
        .md-content h1, .md-content h2, .md-content h3 {
            font-family: 'Space Grotesk', sans-serif;
            color: #65B8FF;
            margin: 18px 0 6px;
            line-height: 1.3;
        }
        .md-content h1 { font-size: 17px; }
        .md-content h2 { font-size: 15.5px; }
        .md-content h3 { font-size: 14px; color: #9BD0FF; }
        .md-content p { margin: 8px 0; }
        .md-content ul, .md-content ol { margin: 6px 0; padding-left: 22px; }
        .md-content li { margin: 4px 0; }
        .md-content li::marker { color: #3EA6FF; }
        .md-content strong { color: #FFFFFF; font-weight: 700; }
        .md-content code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12.5px;
            background: rgba(148, 163, 184, 0.16);
            padding: 1px 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body data-theme="light">
<div id="root"></div>
<script src="discovery.js"></script>
</body>
</html>
