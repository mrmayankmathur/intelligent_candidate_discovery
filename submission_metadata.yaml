# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "MacBook"
  cpu_cores: 8
  ram_gb: 8
  python_version: "3.10.12"
  os: "macOS"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 30

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Two-system architecture: An offline Python engine for ranking, and a Spring Boot + Kotlin/JS web app for the sandbox UI.
  The ranking engine uses pre-computed FAISS (BGE-small embeddings) and BM25 (token-deduplicated) fused via RRF to retrieve the top 500 candidates. 
  A strict filtering pipeline (5 checks) catches keyword-stuffer honeypots and hard disqualifiers. 
  The final score (0.7-0.87 range) blends 8 features (skills, career quality, notice period, etc.). 
  Runs in ~63s with a 2.8GB memory footprint on CPU.

